name: Build and Push Frontend Docker Image

on:
  push:
    branches:
      - main
    paths:
      - "Hans/**"
      - ".github/workflows/frontend.yml"

jobs:
  build-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: crpi-0fzpbl56o7ikr62c.cn-hangzhou.personal.cr.aliyuncs.com
          username: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          password: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./Hans
          file: ./Hans/Dockerfile
          push: true
          tags: |
            crpi-0fzpbl56o7ikr62c.cn-hangzhou.personal.cr.aliyuncs.com/stay_at_your_house_vue/sayh_vue:latest
            crpi-0fzpbl56o7ikr62c.cn-hangzhou.personal.cr.aliyuncs.com/stay_at_your_house_vue/sayh_vue:${{ github.sha }}
