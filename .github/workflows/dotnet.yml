name: Push Docker image to Aliyun Container Registry

on:
  push:
    branches:
      - main
    paths:
      - 'Gentle/**'
      - 'Dockerfile'
      - '.github/workflows/dotnet.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry
        uses: docker/login-action@v3
        with:
          registry: crpi-0fzpbl56o7ikr62c.cn-hangzhou.personal.cr.aliyuncs.com
          username: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          password: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: crpi-0fzpbl56o7ikr62c.cn-hangzhou.personal.cr.aliyuncs.com/stay_at_your_house_api/sayh_api:latest
